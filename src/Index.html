<!DOCTYPE html>
<html lang="en">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Finance Logger</title>
    <style>
      :root {
        color-scheme: light;
        --bg: oklch(0.975 0.011 255);
        --surface: oklch(1 0 0);
        --surface-soft: oklch(0.989 0.006 255);
        --ink: oklch(0.21 0.024 260);
        --muted: oklch(0.43 0.024 260);
        --subtle: oklch(0.62 0.024 260);
        --line: oklch(0.91 0.013 255);
        --focus: oklch(0.58 0.16 252);
        --expense: oklch(0.56 0.21 28);
        --expense-soft: oklch(0.96 0.032 28);
        --income: oklch(0.56 0.16 148);
        --income-soft: oklch(0.96 0.04 148);
        --transfer: oklch(0.55 0.18 255);
        --transfer-soft: oklch(0.96 0.035 255);
        --edit: oklch(0.67 0.16 75);
        --edit-soft: oklch(0.97 0.045 82);
        --danger: oklch(0.58 0.21 28);
        --danger-soft: oklch(0.97 0.035 28);
        --radius: 12px;
        --shadow: 0 8px 18px oklch(0.21 0.024 260 / 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        color: var(--ink);
        font-size: 16px;
        padding: 10px 11px;
      }

      textarea {
        min-height: 76px;
        resize: vertical;
      }

      button {
        border: 0;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      :focus-visible {
        outline: 3px solid oklch(0.58 0.16 252 / 0.28);
        outline-offset: 2px;
      }

      .shell {
        width: min(100%, 620px);
        margin: 0 auto;
        padding: 14px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        margin: -14px -14px 12px;
        padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
        background: oklch(0.975 0.011 255 / 0.94);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }

      .topbar-inner {
        width: min(100%, 620px);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 22px;
        line-height: 1.1;
      }

      h2 {
        font-size: 16px;
        line-height: 1.25;
      }

      .subtitle {
        margin-top: 3px;
        color: var(--muted);
        font-size: 13px;
      }

      .sync-pill {
        min-height: 34px;
        border-radius: 999px;
        padding: 0 11px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mode-switcher {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 2px;
        padding: 2px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
      }

      .mode-button {
        min-height: 30px;
        border-radius: 999px;
        padding: 0 9px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .mode-button.is-active {
        background: var(--transfer-soft);
        color: var(--transfer);
      }

      .mode-button[data-mode="mock"].is-active {
        background: var(--edit-soft);
        color: oklch(0.38 0.09 72);
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .section {
        padding: 14px;
      }

      .section + .section {
        border-top: 1px solid var(--line);
      }

      .type-switcher {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
        background: var(--surface-soft);
        border-bottom: 1px solid var(--line);
      }

      .type-tab {
        min-height: 50px;
        border-radius: 10px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .type-tab.is-active[data-type="Expense"] {
        color: var(--expense);
        background: var(--expense-soft);
        border-color: oklch(0.72 0.14 28);
      }

      .type-tab.is-active[data-type="Income"] {
        color: var(--income);
        background: var(--income-soft);
        border-color: oklch(0.72 0.12 148);
      }

      .type-tab.is-active[data-type="Transfer"] {
        color: var(--transfer);
        background: var(--transfer-soft);
        border-color: oklch(0.72 0.12 255);
      }

      .edit-banner {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        background: var(--edit-soft);
        border-bottom: 1px solid oklch(0.82 0.1 80);
        color: oklch(0.38 0.09 72);
        font-size: 13px;
        font-weight: 700;
      }

      .edit-banner.is-visible {
        display: flex;
      }

      .readiness-notice {
        display: none;
        gap: 10px;
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid oklch(0.82 0.1 80);
        border-radius: var(--radius);
        background: var(--edit-soft);
      }

      .readiness-notice.is-visible {
        display: grid;
      }

      .notice-title {
        color: oklch(0.34 0.08 72);
        font-size: 14px;
        font-weight: 900;
      }

      .notice-copy {
        color: oklch(0.38 0.07 72);
        font-size: 13px;
        line-height: 1.4;
      }

      .notice-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .link-button {
        min-height: 34px;
        padding: 0 10px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .form-grid {
        display: grid;
        gap: 12px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field.expense-category-field {
        min-height: 238px;
        align-content: start;
      }

      .field.account-picker-field {
        min-height: 130px;
        align-content: start;
      }

      label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .type-only {
        display: none;
      }

      .type-only.is-visible {
        display: grid;
      }

      .native-state-control {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
        border: 0;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        min-height: 178px;
      }

      .category-choice {
        min-height: 54px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px;
        text-align: left;
        font-size: 12px;
        font-weight: 850;
        line-height: 1.15;
      }

      .category-choice.is-active {
        color: var(--expense);
        background: var(--expense-soft);
        border-color: oklch(0.72 0.14 28);
      }

      .category-choice-icon {
        width: 26px;
        height: 26px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        background: var(--surface-soft);
        font-size: 14px;
      }

      .category-choice.is-active .category-choice-icon {
        background: oklch(0.91 0.055 28);
      }

      .category-choice-label {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .account-type-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        min-height: 48px;
      }

      .account-type-button {
        min-height: 48px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--muted);
        display: grid;
        place-items: center;
        gap: 2px;
        padding: 6px 4px;
        text-align: center;
        font-size: 10px;
        font-weight: 850;
        line-height: 1.1;
      }

      .account-type-button strong {
        color: var(--ink);
        font-size: 13px;
        line-height: 1;
      }

      .account-type-button.is-active {
        color: var(--transfer);
        background: var(--transfer-soft);
        border-color: oklch(0.72 0.12 255);
      }

      .account-type-button.is-active strong {
        color: var(--transfer);
      }

      .picker-button {
        width: 100%;
        min-height: 58px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        text-align: left;
      }

      .picker-button-main {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .picker-button-value {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
        font-weight: 850;
      }

      .picker-button-meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.25;
      }

      .picker-arrow {
        color: var(--subtle);
        font-size: 22px;
        line-height: 1;
      }

      .picker-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        background: oklch(0.21 0.024 260 / 0.34);
      }

      .picker-backdrop.is-visible {
        display: block;
      }

      .picker-sheet {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 50;
        width: min(100%, 620px);
        max-height: min(78vh, 620px);
        display: none;
        grid-template-rows: auto auto 1fr;
        transform: translateX(-50%);
        border: 1px solid var(--line);
        border-bottom: 0;
        border-radius: 12px 12px 0 0;
        background: var(--surface);
        box-shadow: 0 -10px 24px oklch(0.21 0.024 260 / 0.14);
        overflow: hidden;
      }

      .picker-sheet.is-visible {
        display: grid;
      }

      .picker-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      .picker-title {
        font-size: 16px;
        font-weight: 900;
      }

      .picker-subtitle {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .picker-search-wrap {
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
      }

      .picker-list {
        display: grid;
        gap: 8px;
        min-height: 220px;
        overflow: auto;
        padding: 12px 14px calc(16px + env(safe-area-inset-bottom));
      }

      .picker-choice {
        min-height: 52px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--ink);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        text-align: left;
      }

      .picker-choice.is-active {
        color: var(--expense);
        background: var(--expense-soft);
        border-color: oklch(0.72 0.14 28);
      }

      .picker-choice.is-account-active {
        color: var(--transfer);
        background: var(--transfer-soft);
        border-color: oklch(0.72 0.12 255);
      }

      .picker-choice strong,
      .picker-choice span {
        display: block;
      }

      .picker-choice strong {
        font-size: 14px;
      }

      .picker-choice span {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .picker-check {
        color: var(--expense);
        font-weight: 900;
      }

      .presets {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }

      .presets::-webkit-scrollbar {
        display: none;
      }

      .preset-chip {
        flex: 0 0 auto;
        min-height: 38px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--ink);
        padding: 0 12px;
        font-size: 13px;
        font-weight: 800;
      }

      .preset-chip.is-selected {
        border-color: var(--ink);
        background: var(--ink);
        color: var(--surface);
      }

      .empty-line {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .primary-button {
        min-height: 50px;
        border-radius: 10px;
        background: var(--expense);
        color: white;
        font-weight: 900;
      }

      .primary-button[data-type="Income"] {
        background: var(--income);
      }

      .primary-button[data-type="Transfer"] {
        background: var(--transfer);
      }

      .primary-button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .secondary-button {
        min-height: 50px;
        border-radius: 10px;
        padding: 0 14px;
        background: var(--surface-soft);
        border: 1px solid var(--line);
        color: var(--muted);
        font-weight: 850;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--income);
      }

      .recent-header,
      .admin-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .recent-list {
        display: grid;
        gap: 8px;
      }

      .recent-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-soft);
      }

      .recent-main {
        min-width: 0;
      }

      .recent-title {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        font-size: 14px;
        font-weight: 850;
      }

      .recent-title span:last-child {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .badge {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 3px 7px;
        font-size: 11px;
        font-weight: 900;
      }

      .badge.Expense {
        color: var(--expense);
        background: var(--expense-soft);
      }

      .badge.Income {
        color: var(--income);
        background: var(--income-soft);
      }

      .badge.Transfer {
        color: var(--transfer);
        background: var(--transfer-soft);
      }

      .recent-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .recent-actions {
        display: flex;
        gap: 6px;
      }

      .small-button {
        min-height: 34px;
        border-radius: 9px;
        padding: 0 9px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .small-button.danger {
        color: var(--danger);
        background: var(--danger-soft);
        border-color: oklch(0.84 0.08 28);
      }

      details.admin {
        margin-top: 12px;
      }

      details.admin summary {
        list-style: none;
        cursor: pointer;
      }

      details.admin summary::-webkit-details-marker {
        display: none;
      }

      .admin-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .admin-output {
        max-height: 220px;
        overflow: auto;
        margin: 10px 0 0;
        padding: 10px;
        border-radius: 10px;
        background: oklch(0.21 0.024 260);
        color: oklch(0.96 0.01 255);
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      @media (max-width: 460px) {
        .shell {
          padding: 10px;
          padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .topbar {
          margin: -10px -10px 10px;
          padding-left: 10px;
          padding-right: 10px;
        }

        .field-grid,
        .actions,
        .admin-grid {
          grid-template-columns: 1fr;
        }

        .recent-item {
          grid-template-columns: 1fr;
        }

        .recent-actions {
          justify-content: flex-end;
        }

        .notice-actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .field.expense-category-field {
          min-height: 298px;
        }

        .field.account-picker-field {
          min-height: 132px;
        }

        .choice-grid {
          min-height: 238px;
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        button,
        input,
        select,
        textarea,
        .category-choice,
        .account-type-button,
        .picker-button,
        .picker-choice {
          transition:
            border-color 160ms ease-out,
            background-color 160ms ease-out,
            color 160ms ease-out,
            opacity 160ms ease-out;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div>
            <h1>Quick Log</h1>
            <p class="subtitle" id="sheetName">Loading workbook...</p>
          </div>
          <div class="topbar-actions">
            <div class="mode-switcher" role="tablist" aria-label="Workbook mode">
              <button class="mode-button is-active" type="button" data-mode="real" role="tab" aria-selected="true">Real</button>
              <button class="mode-button" type="button" data-mode="mock" role="tab" aria-selected="false">Mock</button>
            </div>
            <button class="sync-pill" type="button" id="refreshButton">Refresh</button>
          </div>
        </div>
      </header>

      <section class="readiness-notice" id="readinessNotice" aria-live="polite">
        <div>
          <p class="notice-title" id="readinessTitle">Workbook setup needed</p>
          <p class="notice-copy" id="readinessCopy">Real tabs are not ready yet.</p>
        </div>
        <div class="notice-actions">
          <button class="secondary-button" type="button" id="setupFromNoticeButton">Setup real workbook</button>
          <button class="secondary-button" type="button" id="mockFromNoticeButton">Use mock mode</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="quickLogTitle">
        <div class="type-switcher" role="tablist" aria-label="Transaction type">
          <button class="type-tab is-active" type="button" data-type="Expense" role="tab">Expense</button>
          <button class="type-tab" type="button" data-type="Income" role="tab">Income</button>
          <button class="type-tab" type="button" data-type="Transfer" role="tab">Transfer</button>
        </div>

        <div class="edit-banner" id="editBanner">
          <span id="editLabel">Editing transaction</span>
          <button class="link-button" type="button" id="cancelEditButton">Cancel</button>
        </div>

        <form class="section form-grid" id="transactionForm">
          <div class="recent-header">
            <h2 id="quickLogTitle">New transaction</h2>
            <span class="status" id="formMode">Expense</span>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="dateInput">Date</label>
              <input id="dateInput" name="Date" type="date" required>
            </div>
            <div class="field">
              <label for="amountInput">Amount</label>
              <input id="amountInput" name="Amount" type="number" inputmode="decimal" min="0.01" step="0.01" placeholder="0.00" required>
            </div>

            <div class="field full type-only is-visible expense-category-field" data-visible-for="Expense">
              <label id="expenseTier1Label">Tier 1</label>
              <select class="native-state-control" id="expenseTier1Input" aria-labelledby="expenseTier1Label" tabindex="-1"></select>
              <div class="choice-grid" id="expenseTier1Grid" role="radiogroup" aria-labelledby="expenseTier1Label"></div>
            </div>
            <div class="field full type-only is-visible" data-visible-for="Expense">
              <label id="expenseTier2Label">Tier 2</label>
              <select class="native-state-control" id="expenseTier2Input" aria-labelledby="expenseTier2Label" tabindex="-1"></select>
              <button class="picker-button" id="expenseTier2Button" type="button" aria-haspopup="dialog">
                <span class="picker-button-main">
                  <span class="picker-button-value" id="expenseTier2Value">Select tier 2</span>
                  <span class="picker-button-meta" id="expenseTier2Meta">Choose Tier 1 first</span>
                </span>
                <span class="picker-arrow" aria-hidden="true">&rsaquo;</span>
              </button>

            <div class="field type-only" data-visible-for="Income">
              <label for="incomeCategoryInput">Income category</label>

            <div class="field type-only" data-visible-for="Income">

            <div class="field full type-only account-picker-field" data-visible-for="Transfer">

            <div class="field full type-only is-visible account-picker-field" data-visible-for="Expense Income">
              <label id="accountLabel">Account</label>
              <select class="native-state-control" id="accountInput" aria-labelledby="accountLabel" tabindex="-1"></select>
              <div class="account-type-grid" id="accountTypeGrid" role="radiogroup" aria-labelledby="accountLabel"></div>
              <button class="picker-button" id="accountButton" type="button" aria-haspopup="dialog" data-account-slot="account">
                <span class="picker-button-main">
                  <span class="picker-button-value" id="accountValue">Select account</span>
                  <span class="picker-button-meta" id="accountMeta">Choose account type first</span>

              <div class="account-type-grid" id="toAccountTypeGrid" role="radiogroup" aria-labelledby="toAccountLabel"></div>
              <button class="picker-button" id="toAccountButton" type="button" aria-haspopup="dialog" data-account-slot="toAccount">
                <span class="picker-button-main">
                  <span class="picker-button-value" id="toAccountValue">Select account</span>
                  <span class="picker-button-meta" id="toAccountMeta">Choose account type first</span>
                </span>
                <span class="picker-arrow" aria-hidden="true">&rsaquo;</span>
              </button>

            <div class="field type-only is-visible" data-visible-for="Expense">
              <label for="deductionInput">Tax deduction status</label>
              <select id="deductionInput">
                <option value="No">No</option>
                <option value="Check">Check</option>
                <option value="Yes">Yes</option>
              </select>
            </div>
            <div class="field full">
              <label for="memoInput">Memo</label>
              <textarea id="memoInput" placeholder="Optional note"></textarea>
            </div>

          <div class="actions">
            <button class="primary-button" type="submit" id="submitButton" data-type="Expense">Log expense</button>
            <button class="secondary-button" type="button" id="resetButton">Reset</button>

          <p class="status" id="statusText" role="status">Loading Quick Log data...</p>
        </form>

        <div class="section">
          <div class="recent-header">
            <h2>Presets</h2>

          <div class="presets" id="presetList"></div>
        </div>

      <section class="section panel" aria-labelledby="recentTitle" style="margin-top: 12px;">
        <div class="recent-header">
          <h2 id="recentTitle">Recent logs</h2>
          <button class="link-button" type="button" id="recentRefreshButton">Reload</button>
        </div>
        <div class="recent-list" id="recentList"></div>
      </section>

      <details class="admin panel">
        <summary class="section admin-summary">
          <h2>Workbook tools</h2>
          <span class="link-button">Open</span>
        </summary>
        <div class="section">
          <div class="admin-grid">
            <button class="secondary-button" type="button" data-admin-action="getConnectionStatus">Check connection</button>
            <button class="secondary-button" type="button" data-admin-action="setupWorkbook">Setup real workbook</button>
            <button class="secondary-button" type="button" data-admin-action="getWorkbookSetupStatus">Check real workbook</button>
            <button class="secondary-button" type="button" data-admin-action="getQuickLogBootstrap">Check quick log</button>
            <button class="secondary-button" type="button" data-admin-action="getMockQuickLogBootstrap">Check mock quick log</button>
            <button class="secondary-button" type="button" data-admin-action="seedMockWorkbook">Seed mock workbook</button>
            <button class="secondary-button" type="button" data-admin-action="getMockWorkbookStatus">Check mock workbook</button>
            <button class="secondary-button" type="button" data-admin-action="getMockReviewReport">Review mock data</button>
            <button class="secondary-button" type="button" data-admin-action="runMockQuickLogCheck">Run mock smoke test</button>
          </div>

        </div>

    </main>

    <div class="picker-backdrop" id="pickerBackdrop"></div>
    <section class="picker-sheet" id="tier2Picker" role="dialog" aria-modal="true" aria-labelledby="tier2PickerTitle">
      <div class="picker-header">
        <div>
          <p class="picker-title" id="tier2PickerTitle">Choose Tier 2</p>
          <p class="picker-subtitle" id="tier2PickerSubtitle">Select a Tier 1 category first.</p>
        </div>
        <button class="link-button" type="button" id="closeTier2PickerButton">Close</button>
      </div>
      <div class="picker-search-wrap">
        <input id="tier2SearchInput" type="search" placeholder="Search Tier 2 choices">
      </div>
      <div class="picker-list" id="tier2PickerList"></div>
    </section>

    <script>
      const state = {
        mode: "real",
        type: "Expense",
        bootstrap: null,
        recentTransactions: [],
        editId: null,
        selectedPresetUsed: "",
        accountTypeBySlot: {
          account: "Bank",
          fromAccount: "Bank",
          toAccount: "Bank"
        },
        pickerMode: null,
        pickerAccountSlot: null,
        submitting: false
      };

      const modeActions = {
        real: {
          label: "Real workbook",
          bootstrap: "getQuickLogBootstrap",
          recent: "getRecentTransactions",
          create: "createTransaction",
          update: "updateTransaction",
          remove: "softDeleteTransaction"
        },
        mock: {
          label: "Mock workbook",
          bootstrap: "getMockQuickLogBootstrap",
          recent: "getRecentMockTransactions",
          create: "createMockTransaction",
          update: "updateMockTransaction",
          remove: "softDeleteMockTransaction"
        }
      };

      const accountTypeButtons = [
        { value: "Cash", label: "Cash", short: "$" },
        { value: "Bank", label: "Bank", short: "B" },
        { value: "Wallet", label: "Wallet", short: "W" },
        { value: "Credit", label: "Credit", short: "C" },
        { value: "Invest", label: "Invest", short: "I" }
      ];

      const els = {
        sheetName: document.getElementById("sheetName"),
        refreshButton: document.getElementById("refreshButton"),
        recentRefreshButton: document.getElementById("recentRefreshButton"),
        modeButtons: Array.from(document.querySelectorAll(".mode-button")),
        tabs: Array.from(document.querySelectorAll(".type-tab")),
        form: document.getElementById("transactionForm"),
        formMode: document.getElementById("formMode"),
        editBanner: document.getElementById("editBanner"),
        editLabel: document.getElementById("editLabel"),
        cancelEditButton: document.getElementById("cancelEditButton"),
        date: document.getElementById("dateInput"),
        amount: document.getElementById("amountInput"),
        expenseTier1: document.getElementById("expenseTier1Input"),
        expenseTier2: document.getElementById("expenseTier2Input"),
        expenseTier1Grid: document.getElementById("expenseTier1Grid"),
        expenseTier2Button: document.getElementById("expenseTier2Button"),
        expenseTier2Value: document.getElementById("expenseTier2Value"),
        expenseTier2Meta: document.getElementById("expenseTier2Meta"),
        tier2Picker: document.getElementById("tier2Picker"),
        pickerBackdrop: document.getElementById("pickerBackdrop"),
        tier2PickerTitle: document.getElementById("tier2PickerTitle"),
        tier2PickerSubtitle: document.getElementById("tier2PickerSubtitle"),
        tier2SearchInput: document.getElementById("tier2SearchInput"),
        tier2PickerList: document.getElementById("tier2PickerList"),
        closeTier2PickerButton: document.getElementById("closeTier2PickerButton"),
        incomeCategory: document.getElementById("incomeCategoryInput"),
        transferCategory: document.getElementById("transferCategoryInput"),
        account: document.getElementById("accountInput"),
        accountTypeGrid: document.getElementById("accountTypeGrid"),
        accountButton: document.getElementById("accountButton"),
        accountValue: document.getElementById("accountValue"),
        accountMeta: document.getElementById("accountMeta"),
        fromAccount: document.getElementById("fromAccountInput"),
        fromAccountTypeGrid: document.getElementById("fromAccountTypeGrid"),
        fromAccountButton: document.getElementById("fromAccountButton"),
        fromAccountValue: document.getElementById("fromAccountValue"),
        fromAccountMeta: document.getElementById("fromAccountMeta"),
        toAccount: document.getElementById("toAccountInput"),
        toAccountTypeGrid: document.getElementById("toAccountTypeGrid"),
        toAccountButton: document.getElementById("toAccountButton"),
        toAccountValue: document.getElementById("toAccountValue"),
        toAccountMeta: document.getElementById("toAccountMeta"),
        taxable: document.getElementById("taxableInput"),
        deduction: document.getElementById("deductionInput"),
        memo: document.getElementById("memoInput"),
        submitButton: document.getElementById("submitButton"),
        resetButton: document.getElementById("resetButton"),
        status: document.getElementById("statusText"),
        readinessNotice: document.getElementById("readinessNotice"),
        readinessTitle: document.getElementById("readinessTitle"),
        readinessCopy: document.getElementById("readinessCopy"),
        setupFromNoticeButton: document.getElementById("setupFromNoticeButton"),
        mockFromNoticeButton: document.getElementById("mockFromNoticeButton"),
        presetList: document.getElementById("presetList"),
        recentList: document.getElementById("recentList"),
        adminOutput: document.getElementById("adminOutput")
      };

      function gasCall(action, ...args) {
        return new Promise((resolve, reject) => {
          if (!window.google || !google.script || !google.script.run) {
            reject(new Error("google.script.run is available only inside the Apps Script web app."));
            return;
          }

          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler((error) => reject(error))
            [action](...args);
        });
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function setStatus(message, kind = "") {
        els.status.textContent = message;
        els.status.className = `status ${kind}`.trim();
      }

      function setFormReady(isReady) {
        els.submitButton.disabled = !isReady;
      }

      function showReadinessNotice(title, copy) {
        els.readinessTitle.textContent = title;
        els.readinessCopy.textContent = copy;
        els.readinessNotice.classList.add("is-visible");
      }

      function hideReadinessNotice() {
        els.readinessNotice.classList.remove("is-visible");
      }

      function isSetupMissingError(message) {
        return state.mode === "real" && String(message || "").includes("Run setupWorkbook() first");
      }

      function getModeActions() {
        return modeActions[state.mode];
      }

      function setMode(mode, shouldLoad = false) {
        state.mode = mode;
        state.editId = null;
        els.modeButtons.forEach((button) => {
          const isActive = button.dataset.mode === mode;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-selected", String(isActive));
        });
        setStatus(`${getModeActions().label} selected.`);

        if (shouldLoad) {
          loadBootstrap();
        }
      }

      function setType(type) {
        state.type = type;
        els.tabs.forEach((tab) => {
          tab.classList.toggle("is-active", tab.dataset.type === type);
          tab.setAttribute("aria-selected", String(tab.dataset.type === type));
        });
        document.querySelectorAll(".type-only").forEach((field) => {
          field.classList.toggle("is-visible", field.dataset.visibleFor.split(" ").includes(type));
        });
        els.formMode.textContent = state.editId ? `Editing ${type}` : type;
        els.submitButton.dataset.type = type;
        els.submitButton.textContent = state.editId ? "Save changes" : `Log ${type.toLowerCase()}`;
        renderExpenseCategoryControls();
        renderAccountControls();
      }

      function rowValue(row, key) {
        return row && row[key] !== undefined ? row[key] : "";
      }

      function unique(values) {
        return Array.from(new Set(values.filter(Boolean))).sort((a, b) => a.localeCompare(b));
      }

      function compactLabel(value) {
        const words = String(value || "").split(/\s+/).filter(Boolean);
        if (!words.length) {
          return "";
        }
        return words
          .slice(0, 2)
          .map((word) => word[0])
          .join("")
          .toUpperCase();
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function optionValue(option) {
        return typeof option === "string" ? option : option.value;
      }

      function optionLabel(option) {
        return typeof option === "string" ? option : option.label;
      }

      function fillSelect(id, options, placeholder) {
        const select = document.getElementById(id);
        const currentValue = select.value;
        const uniqueOptions = Array.from(
          new Map(
            options
              .filter((option) => optionValue(option))
              .map((option) => [optionValue(option), option])
          ).values()
        ).sort((left, right) => optionLabel(left).localeCompare(optionLabel(right)));
        const hasCurrentValue = uniqueOptions.some((option) => optionValue(option) === currentValue);

        select.innerHTML = [
          `<option value="">${escapeHtml(placeholder)}</option>`,
          ...uniqueOptions.map(
            (option) =>
              `<option value="${escapeHtml(optionValue(option))}">${escapeHtml(optionLabel(option))}</option>`
          )
        ].join("");

        if (currentValue && hasCurrentValue) {
          select.value = currentValue;
        }
      }

      function expenseTier2OptionsForTier1(tier1) {
        const expenseCategories = state.bootstrap?.expenseCategories || [];
        const scopedCategories = tier1
          ? expenseCategories.filter((row) => rowValue(row, "Tier 1") === tier1)
          : expenseCategories;

        return scopedCategories.map((row) => rowValue(row, "Tier 2"));
      }

      function renderExpenseTier2Options() {
        const previousTier2 = els.expenseTier2.value;
        fillSelect("expenseTier2Input", expenseTier2OptionsForTier1(els.expenseTier1.value), "Select tier 2");

        if (
          previousTier2 &&
          !Array.from(els.expenseTier2.options).some((option) => option.value === previousTier2)
        ) {
          els.expenseTier2.value = "";
        }

        renderExpenseTier2Button();
      }

      function renderExpenseTier1Buttons() {
        const options = unique((state.bootstrap?.expenseCategories || []).map((row) => rowValue(row, "Tier 1")));

        if (!options.length) {
          els.expenseTier1Grid.innerHTML = '<p class="empty-line">No expense categories loaded yet.</p>';
          return;
        }

        els.expenseTier1Grid.innerHTML = options
          .map((name) => {
            const isActive = name === els.expenseTier1.value;
            return `
              <button class="category-choice ${isActive ? "is-active" : ""}" type="button" role="radio" aria-checked="${String(
                isActive
              )}" data-expense-tier1="${escapeHtml(name)}">
                <span class="category-choice-icon" aria-hidden="true">${escapeHtml(compactLabel(name))}</span>
                <span class="category-choice-label">${escapeHtml(name)}</span>
              </button>
            `;
          })
          .join("");
      }

      function renderExpenseTier2Button() {
        const tier1 = els.expenseTier1.value;
        const tier2 = els.expenseTier2.value;
        const count = expenseTier2OptionsForTier1(tier1).filter(Boolean).length;

        els.expenseTier2Button.disabled = !tier1;
        els.expenseTier2Value.textContent = tier2 || "Select tier 2";
        els.expenseTier2Meta.textContent = tier1
          ? `${count} choices under ${tier1}`
          : "Choose Tier 1 first";
      }

      function renderExpenseCategoryControls() {
        renderExpenseTier1Buttons();
        renderExpenseTier2Options();
      }

      function selectExpenseTier1(tier1) {
        setControlValue(els.expenseTier1, tier1);
        renderExpenseTier2Options();
        renderExpenseTier1Buttons();

        openTier2Picker();
      }

      function openTier2Picker() {
        if (state.type !== "Expense" || !els.expenseTier1.value) {
          return;
        }

        state.pickerMode = "tier2";
        state.pickerAccountSlot = null;
        els.tier2SearchInput.value = "";
        els.tier2SearchInput.placeholder = "Search Tier 2 choices";
        els.tier2PickerTitle.textContent = "Choose Tier 2";
        els.tier2PickerSubtitle.textContent = `${els.expenseTier1.value} category choices`;
        renderTier2PickerChoices();
        els.pickerBackdrop.classList.add("is-visible");
        els.tier2Picker.classList.add("is-visible");
        setTimeout(() => els.tier2SearchInput.focus(), 80);
      }

      function closeTier2Picker() {
        els.pickerBackdrop.classList.remove("is-visible");
        els.tier2Picker.classList.remove("is-visible");
        state.pickerMode = null;
        state.pickerAccountSlot = null;
      }

      function renderTier2PickerChoices() {
        const query = els.tier2SearchInput.value.trim().toLowerCase();
        const choices = unique(expenseTier2OptionsForTier1(els.expenseTier1.value)).filter((name) =>
          name.toLowerCase().includes(query)
        );

        if (!choices.length) {
          els.tier2PickerList.innerHTML = '<p class="empty-line">No Tier 2 category found.</p>';
          return;
        }

        els.tier2PickerList.innerHTML = choices
          .map((name) => {
            const isActive = name === els.expenseTier2.value;
            return `
              <button class="picker-choice ${isActive ? "is-active" : ""}" type="button" data-expense-tier2="${escapeHtml(
                name
              )}">
                <span>
                  <strong>${escapeHtml(name)}</strong>
                  <span>Under ${escapeHtml(els.expenseTier1.value)}</span>
                </span>
                <span class="picker-check" aria-hidden="true">${isActive ? "&check;" : ""}</span>
              </button>
            `;
          })
          .join("");
      }

      function accountSlotConfig(slot) {
        const configs = {
          account: {
            select: els.account,
            grid: els.accountTypeGrid,
            button: els.accountButton,
            value: els.accountValue,
            meta: els.accountMeta,
            title: state.type === "Income" ? "Choose received account" : "Choose account"
          },
          fromAccount: {
            select: els.fromAccount,
            grid: els.fromAccountTypeGrid,
            button: els.fromAccountButton,
            value: els.fromAccountValue,
            meta: els.fromAccountMeta,
            title: "Choose from account"
          },
          toAccount: {
            select: els.toAccount,
            grid: els.toAccountTypeGrid,
            button: els.toAccountButton,
            value: els.toAccountValue,
            meta: els.toAccountMeta,
            title: "Choose to account"
          }
        };

        return configs[slot];
      }

      function normalizeAccountType(accountType) {
        if (accountType === "Credit Card" || accountType === "Credit Line" || accountType === "Credit") {
          return "Credit";
        }

        if (accountType === "Investment" || accountType === "Invest") {
          return "Invest";
        }

        return accountType || "Bank";
      }

      function accountById(accountId) {
        return (state.bootstrap?.accounts || []).find((account) => rowValue(account, "Account ID") === accountId);
      }

      function accountDisplayName(account) {
        if (!account) {
          return "";
        }

        return rowValue(account, "Display Name") || rowValue(account, "Account ID");
      }

      function accountMatchesType(account, accountType) {
        return normalizeAccountType(rowValue(account, "Account Type")) === accountType;
      }

      function syncAccountTypeFromSelected(slot) {
        const config = accountSlotConfig(slot);
        const selectedAccount = accountById(config.select.value);

        if (selectedAccount) {
          state.accountTypeBySlot[slot] = normalizeAccountType(rowValue(selectedAccount, "Account Type"));
        }
      }

      function accountChoicesForSlot(slot) {
        const selectedType = state.accountTypeBySlot[slot] || "Bank";
        const query = els.tier2SearchInput.value.trim().toLowerCase();

        return (state.bootstrap?.accounts || [])
          .filter((account) => {
            const activeValue = rowValue(account, "Active?");
            return activeValue === true || String(activeValue).toUpperCase() === "TRUE";
          })
          .filter((account) => accountMatchesType(account, selectedType))
          .filter((account) => {
            if (!query) {
              return true;
            }

            return [
              rowValue(account, "Account ID"),
              rowValue(account, "Display Name"),
              rowValue(account, "Full Name"),
              rowValue(account, "Account Type"),
              rowValue(account, "Last 4")
            ].join(" ").toLowerCase().includes(query);
          })
          .sort((left, right) => Number(rowValue(left, "Sort Order") || 999) - Number(rowValue(right, "Sort Order") || 999));
      }

      function renderAccountTypeButtons(slot) {
        const config = accountSlotConfig(slot);
        const activeType = state.accountTypeBySlot[slot] || "Bank";

        config.grid.innerHTML = accountTypeButtons
          .map((accountType) => {
            const isActive = accountType.value === activeType;
            return `
              <button class="account-type-button ${isActive ? "is-active" : ""}" type="button" role="radio" aria-checked="${String(
                isActive
              )}" data-account-slot="${escapeHtml(slot)}" data-account-type="${escapeHtml(accountType.value)}">
                <strong>${escapeHtml(accountType.short)}</strong>
                <span>${escapeHtml(accountType.label)}</span>
              </button>
            `;
          })
          .join("");
      }

      function renderAccountPickerButton(slot) {
        const config = accountSlotConfig(slot);
        const selectedAccount = accountById(config.select.value);
        const selectedType = state.accountTypeBySlot[slot] || "Bank";
        const count = (state.bootstrap?.accounts || []).filter((account) => {
          const activeValue = rowValue(account, "Active?");
          return (
            (activeValue === true || String(activeValue).toUpperCase() === "TRUE") &&
            accountMatchesType(account, selectedType)
          );
        }).length;

        config.value.textContent = selectedAccount ? accountDisplayName(selectedAccount) : "Select account";
        config.meta.textContent = selectedAccount
          ? `${rowValue(selectedAccount, "Account Type") || selectedType} account`
          : `${count} ${selectedType} account${count === 1 ? "" : "s"}`;
      }

      function renderAccountControls() {
        ["account", "fromAccount", "toAccount"].forEach((slot) => {
          syncAccountTypeFromSelected(slot);
          renderAccountTypeButtons(slot);
          renderAccountPickerButton(slot);
        });
      }

      function openAccountPicker(slot, accountType) {
        if (accountType) {
          state.accountTypeBySlot[slot] = accountType;
        }

        state.pickerMode = "account";
        state.pickerAccountSlot = slot;
        renderAccountTypeButtons(slot);
        renderAccountPickerButton(slot);
        els.tier2SearchInput.value = "";
        els.tier2SearchInput.placeholder = "Search accounts";
        els.tier2PickerTitle.textContent = accountSlotConfig(slot).title;
        els.tier2PickerSubtitle.textContent = `${state.accountTypeBySlot[slot]} accounts`;
        renderAccountPickerChoices();
        els.pickerBackdrop.classList.add("is-visible");
        els.tier2Picker.classList.add("is-visible");
        setTimeout(() => els.tier2SearchInput.focus(), 80);
      }

      function renderAccountPickerChoices() {
        const slot = state.pickerAccountSlot;
        const config = accountSlotConfig(slot);
        const choices = accountChoicesForSlot(slot);

        if (!choices.length) {
          els.tier2PickerList.innerHTML = '<p class="empty-line">No account found for this type.</p>';
          return;
        }

        els.tier2PickerList.innerHTML = choices
          .map((account) => {
            const accountId = rowValue(account, "Account ID");
            const isActive = accountId === config.select.value;
            const fullName = rowValue(account, "Full Name");
            const accountType = rowValue(account, "Account Type");
            const last4 = rowValue(account, "Last 4");
            const meta = [accountType, last4 ? `ending ${last4}` : "", fullName].filter(Boolean).join(" - ");

            return `
              <button class="picker-choice ${isActive ? "is-account-active" : ""}" type="button" data-account-id="${escapeHtml(
                accountId
              )}">
                <span>
                  <strong>${escapeHtml(accountDisplayName(account))}</strong>
                  <span>${escapeHtml(meta || accountId)}</span>
                </span>
                <span class="picker-check" aria-hidden="true">${isActive ? "&check;" : ""}</span>
              </button>
            `;
          })
          .join("");
      }

      function selectAccount(slot, accountId) {
        const config = accountSlotConfig(slot);
        setControlValue(config.select, accountId);
        syncAccountTypeFromSelected(slot);
        renderAccountControls();
        closeTier2Picker();
        setStatus(`${config.title} selected.`);
      }

      function setControlValue(control, value) {
        const nextValue = value || "";

        if (control.tagName === "SELECT" && nextValue && !Array.from(control.options).some((option) => option.value === nextValue)) {
          control.add(new Option(nextValue, nextValue));
        }

        control.value = nextValue;
      }

      function accountOptions() {
        return (state.bootstrap?.accounts || []).map((account) => {
          const accountId = rowValue(account, "Account ID");
          const displayName = rowValue(account, "Display Name") || accountId;
          const accountType = rowValue(account, "Account Type");

          return {
            value: accountId,
            label: accountType ? `${displayName} (${accountType})` : displayName
          };
        });
      }

      function renderReferenceData() {
        const expenseCategories = state.bootstrap?.expenseCategories || [];
        fillSelect(
          "expenseTier1Input",
          expenseCategories.map((row) => rowValue(row, "Tier 1")),
          "Select tier 1"
        );
        renderExpenseCategoryControls();
        fillSelect(
          "incomeCategoryInput",
          (state.bootstrap?.incomeCategories || []).map((row) => rowValue(row, "Category")),
          "Select income category"
        );
        fillSelect(
          "transferCategoryInput",
          (state.bootstrap?.transferCategories || []).map((row) => rowValue(row, "Category")),
          "Select transfer category"
        );
        fillSelect("accountInput", accountOptions(), "Select account");
        fillSelect("fromAccountInput", accountOptions(), "Select from account");
        fillSelect("toAccountInput", accountOptions(), "Select to account");
        renderAccountControls();
      }

      function renderPresets() {
        const presets = state.bootstrap?.presets || [];
        const activePresets = presets.filter((preset) => rowValue(preset, "Type") === state.type);

        if (activePresets.length === 0) {
          els.presetList.innerHTML = '<p class="empty-line">No active presets for this type yet.</p>';
          return;
        }

        els.presetList.innerHTML = activePresets
          .map(
            (preset) =>
              `<button class="preset-chip ${
                rowValue(preset, "Preset Name") === state.selectedPresetUsed ? "is-selected" : ""
              }" type="button" data-preset-id="${escapeHtml(
                rowValue(preset, "Preset ID")
              )}" aria-pressed="${String(
                rowValue(preset, "Preset Name") === state.selectedPresetUsed
              )}">${escapeHtml(rowValue(preset, "Preset Name"))}</button>`
          )
          .join("");
      }

      function renderRecent() {
        if (!state.recentTransactions.length) {
          els.recentList.innerHTML = '<p class="empty-line">No recent logs yet.</p>';
          return;
        }

        els.recentList.innerHTML = state.recentTransactions
          .map((transaction) => {
            const type = rowValue(transaction, "Type");
            const label = rowValue(transaction, "Memo") || rowValue(transaction, "Tier 2") || rowValue(transaction, "Tier 1");
            const amount = Number(rowValue(transaction, "Amount") || 0).toLocaleString(undefined, {
              maximumFractionDigits: 2
            });
            const account =
              type === "Transfer"
                ? `${rowValue(transaction, "From Account")} to ${rowValue(transaction, "To Account")}`
                : rowValue(transaction, "Account");

            return `
              <article class="recent-item">
                <div class="recent-main">
                  <div class="recent-title">
                    <span class="badge ${escapeHtml(type)}">${escapeHtml(type)}</span>
                    <span>${escapeHtml(label || "Untitled transaction")}</span>
                  </div>
                  <div class="recent-meta">${escapeHtml(rowValue(transaction, "Date"))} - ${escapeHtml(
                    amount
                  )} - ${escapeHtml(account)}</div>
                </div>
                <div class="recent-actions">
                  <button class="small-button" type="button" data-edit-id="${escapeHtml(
                    rowValue(transaction, "Transaction ID")
                  )}">Edit</button>
                  <button class="small-button danger" type="button" data-delete-id="${escapeHtml(
                    rowValue(transaction, "Transaction ID")
                  )}">Delete</button>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function clearForm() {
        state.editId = null;
        state.selectedPresetUsed = "";
        els.form.reset();
        els.date.value = today();
        els.taxable.value = "Check";
        els.deduction.value = "No";
        els.editBanner.classList.remove("is-visible");
        setType(state.type);
        renderExpenseCategoryControls();
        renderAccountControls();
        renderPresets();
        setStatus("Ready.");
      }

      function applyPreset(preset) {
        setType(rowValue(preset, "Type") || state.type);
        state.selectedPresetUsed = rowValue(preset, "Preset Name");
        setControlValue(els.amount, rowValue(preset, "Amount"));
        setControlValue(els.expenseTier1, rowValue(preset, "Tier 1"));
        renderExpenseCategoryControls();
        setControlValue(els.expenseTier2, rowValue(preset, "Tier 2"));
        renderExpenseTier2Button();
        setControlValue(els.incomeCategory, rowValue(preset, "Income Category") || rowValue(preset, "Tier 1"));
        setControlValue(els.transferCategory, rowValue(preset, "Transfer Category") || rowValue(preset, "Tier 1"));
        setControlValue(els.account, rowValue(preset, "Account"));
        setControlValue(els.fromAccount, rowValue(preset, "From Account"));
        setControlValue(els.toAccount, rowValue(preset, "To Account"));
        renderAccountControls();
        setControlValue(els.taxable, rowValue(preset, "Taxable?") || "Check");
        setControlValue(els.deduction, rowValue(preset, "Tax Deduction Status") || "No");
        setControlValue(els.memo, rowValue(preset, "Memo"));
      }

      function fillForm(transaction) {
        state.editId = rowValue(transaction, "Transaction ID");
        state.selectedPresetUsed = rowValue(transaction, "Preset Used");
        setType(rowValue(transaction, "Type") || "Expense");
        setControlValue(els.date, rowValue(transaction, "Date") || today());
        setControlValue(els.amount, rowValue(transaction, "Amount"));
        setControlValue(els.expenseTier1, rowValue(transaction, "Tier 1"));
        renderExpenseCategoryControls();
        setControlValue(els.expenseTier2, rowValue(transaction, "Tier 2"));
        renderExpenseTier2Button();
        setControlValue(els.incomeCategory, rowValue(transaction, "Tier 1"));
        setControlValue(els.transferCategory, rowValue(transaction, "Tier 1"));
        setControlValue(els.account, rowValue(transaction, "Account"));
        setControlValue(els.fromAccount, rowValue(transaction, "From Account"));
        setControlValue(els.toAccount, rowValue(transaction, "To Account"));
        renderAccountControls();
        setControlValue(els.taxable, rowValue(transaction, "Taxable?") || "Check");
        setControlValue(els.deduction, rowValue(transaction, "Tax Deduction Status") || "No");
        setControlValue(els.memo, rowValue(transaction, "Memo"));
        els.editLabel.textContent = `Editing ${state.editId}`;
        els.editBanner.classList.add("is-visible");
        renderPresets();
        setStatus("Editing recent transaction.");
      }

      function buildPayload() {
        const payload = {
          Type: state.type,
          Date: els.date.value,
          Amount: els.amount.value,
          Memo: els.memo.value
        };

        if (state.selectedPresetUsed) {
          payload["Preset Used"] = state.selectedPresetUsed;
        }

        if (state.type === "Expense") {
          payload["Tier 1"] = els.expenseTier1.value;
          payload["Tier 2"] = els.expenseTier2.value;
          payload.Account = els.account.value;
          payload["Tax Deduction Status"] = els.deduction.value;
        }

        if (state.type === "Income") {
          payload["Tier 1"] = els.incomeCategory.value;
          payload.Account = els.account.value;
          payload["Taxable?"] = els.taxable.value;
        }

        if (state.type === "Transfer") {
          payload["Tier 1"] = els.transferCategory.value;
          payload["From Account"] = els.fromAccount.value;
          payload["To Account"] = els.toAccount.value;
        }

        return payload;
      }

      async function loadBootstrap() {
        setStatus(`Loading ${getModeActions().label.toLowerCase()} data...`);
        setFormReady(false);
        try {
          const result = await gasCall(getModeActions().bootstrap);
          if (result === null || result === undefined) {
            throw new Error(
              `${getModeActions().bootstrap} returned ${result}. Refresh the /dev deployment; if it repeats, run Check mock quick log.`
            );
          }
          if (!result.ok) {
            throw new Error(result.message || "Quick Log bootstrap failed.");
          }

          state.bootstrap = result;
          state.recentTransactions = result.recentTransactions || [];
          els.sheetName.textContent = `${getModeActions().label}: ${result.spreadsheet?.name || "Connected"}`;
          renderReferenceData();
          renderPresets();
          renderRecent();
          hideReadinessNotice();
          clearForm();
          setFormReady(true);
        } catch (error) {
          const message = error.message || String(error);
          els.sheetName.textContent = "Not connected";
          setStatus(message, "error");
          setFormReady(false);
          if (isSetupMissingError(message)) {
            showReadinessNotice(
              "Real workbook tabs are not set up yet",
              "Mock mode is ready for testing. Set up the real workbook when you are ready to create the real app tabs."
            );
          }
        }
      }

      async function runAdminAction(action) {
        els.adminOutput.textContent =
          action === "seedMockWorkbook" || action === "setupWorkbook" ? "Working..." : "Checking...";
        try {
          const result = await gasCall(action);
          if (result === null || result === undefined) {
            throw new Error(`${action} returned ${result}. The deployed Apps Script may be stale or the function returned a non-serializable value.`);
          }
          els.adminOutput.textContent = JSON.stringify(result, null, 2);
          if (action === "seedMockWorkbook") {
            if (state.mode !== "mock") {
              setMode("mock");
            }
            loadBootstrap();
            return result;
          }
          if (
            (action === "setupWorkbook" && state.mode === "real") ||
            (action === "runMockQuickLogCheck" && state.mode === "mock")
          ) {
            loadBootstrap();
          }
          return result;
        } catch (error) {
          els.adminOutput.textContent = JSON.stringify(
            {
              ok: false,
              message: error.message || String(error)
            },
            null,
            2
          );
          return null;
        }
      }

      async function reloadRecent() {
        setStatus("Reloading recent logs...");
        try {
          const result = await gasCall(getModeActions().recent, 20);
          if (!result.ok) {
            throw new Error(result.message || "Could not reload recent logs.");
          }
          state.recentTransactions = result.transactions || [];
          renderRecent();
          setStatus("Recent logs reloaded.", "success");
        } catch (error) {
          setStatus(error.message || String(error), "error");
        }
      }

      async function submitForm(event) {
        event.preventDefault();
        if (state.submitting) {
          return;
        }

        state.submitting = true;
        els.submitButton.disabled = true;
        setStatus(state.editId ? "Saving changes..." : "Logging transaction...");

        try {
          const payload = buildPayload();
          const result = state.editId
            ? await gasCall(getModeActions().update, state.editId, payload)
            : await gasCall(getModeActions().create, payload);

          if (!result.ok) {
            throw new Error((result.errors || [result.message || "Transaction failed."]).join(" "));
          }

          state.recentTransactions = result.recentTransactions || [];
          renderRecent();
          clearForm();
          setStatus(result.message || "Saved.", "success");
        } catch (error) {
          setStatus(error.message || String(error), "error");
        } finally {
          state.submitting = false;
          els.submitButton.disabled = false;
        }
      }

      async function deleteTransaction(transactionId) {
        const ok = window.confirm(
          `Delete this recent log from the ${getModeActions().label.toLowerCase()}? The row will be soft-deleted.`
        );
        if (!ok) {
          return;
        }

        setStatus("Deleting transaction...");
        try {
          const result = await gasCall(getModeActions().remove, transactionId);
          if (!result.ok) {
            throw new Error((result.errors || [result.message || "Delete failed."]).join(" "));
          }
          state.recentTransactions = result.recentTransactions || [];
          renderRecent();
          if (state.editId === transactionId) {
            clearForm();
          }
          setStatus("Transaction deleted.", "success");
        } catch (error) {
          setStatus(error.message || String(error), "error");
        }
      }

      els.modeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setMode(button.dataset.mode, true);
        });
      });

      els.tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          state.selectedPresetUsed = "";
          setType(tab.dataset.type);
          renderPresets();
        });
      });

      els.form.addEventListener("submit", submitForm);
      els.resetButton.addEventListener("click", clearForm);
      els.cancelEditButton.addEventListener("click", clearForm);
      els.refreshButton.addEventListener("click", loadBootstrap);
      els.recentRefreshButton.addEventListener("click", reloadRecent);
      els.expenseTier1.addEventListener("change", renderExpenseTier2Options);
      els.expenseTier1Grid.addEventListener("click", (event) => {
        const button = event.target.closest("[data-expense-tier1]");
        if (!button) {
          return;
        }
        selectExpenseTier1(button.dataset.expenseTier1);
      });
      els.expenseTier2Button.addEventListener("click", openTier2Picker);
      els.closeTier2PickerButton.addEventListener("click", closeTier2Picker);
      els.pickerBackdrop.addEventListener("click", closeTier2Picker);
      els.tier2SearchInput.addEventListener("input", () => {
        if (state.pickerMode === "account") {
          renderAccountPickerChoices();
          return;
        }

        renderTier2PickerChoices();
      });
      els.tier2PickerList.addEventListener("click", (event) => {
        const accountButton = event.target.closest("[data-account-id]");
        if (accountButton && state.pickerMode === "account") {
          selectAccount(state.pickerAccountSlot, accountButton.dataset.accountId);
          return;
        }

        const button = event.target.closest("[data-expense-tier2]");
        if (!button) {
          return;
        }
        setControlValue(els.expenseTier2, button.dataset.expenseTier2);
        renderExpenseTier2Button();
        renderTier2PickerChoices();
        closeTier2Picker();
        setStatus(`Tier 2 selected: ${button.dataset.expenseTier2}.`);
      });
      document.querySelectorAll(".account-type-grid").forEach((grid) => {
        grid.addEventListener("click", (event) => {
          const button = event.target.closest("[data-account-slot][data-account-type]");
          if (!button) {
            return;
          }

          openAccountPicker(button.dataset.accountSlot, button.dataset.accountType);
        });
      });
      document.querySelectorAll("[data-account-slot].picker-button").forEach((button) => {
        button.addEventListener("click", () => {
          openAccountPicker(button.dataset.accountSlot, state.accountTypeBySlot[button.dataset.accountSlot]);
        });
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeTier2Picker();
        }
      });
      els.setupFromNoticeButton.addEventListener("click", () => {
        runAdminAction("setupWorkbook");
      });
      els.mockFromNoticeButton.addEventListener("click", () => {
        setMode("mock", true);
      });

      els.presetList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-preset-id]");
        if (!button) {
          return;
        }
        const preset = (state.bootstrap?.presets || []).find(
          (item) => rowValue(item, "Preset ID") === button.dataset.presetId
        );
        if (preset) {
          applyPreset(preset);
          renderPresets();
          setStatus(`${rowValue(preset, "Preset Name")} preset applied.`);
        }
      });

      els.recentList.addEventListener("click", (event) => {
        const editButton = event.target.closest("[data-edit-id]");
        const deleteButton = event.target.closest("[data-delete-id]");

        if (editButton) {
          const transaction = state.recentTransactions.find(
            (item) => rowValue(item, "Transaction ID") === editButton.dataset.editId
          );
          if (transaction) {
            fillForm(transaction);
          }
        }

        if (deleteButton) {
          deleteTransaction(deleteButton.dataset.deleteId);
        }
      });

      document.querySelectorAll("[data-admin-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          runAdminAction(button.dataset.adminAction);
        });
      });

      els.date.value = today();
      setMode("real");
      setType("Expense");
      loadBootstrap();
    </script>
  </body>
</html>
