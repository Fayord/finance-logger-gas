<!DOCTYPE html>
<html lang="en">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Finance Logger</title>
  </head>
  <body>
    <main>
      <h1>Finance Logger</h1>
      <p>Quick Log UI scaffold. Migrate the polished prototype from docs/prototypes/quick-log-mockup.html here when implementation begins.</p>

      <section>
        <h2>Google Sheet Connection</h2>
        <button type="button" data-action="getConnectionStatus">Check connection</button>
        <button type="button" data-action="setupWorkbook">Setup real workbook</button>
        <button type="button" data-action="getWorkbookSetupStatus">Check real workbook</button>
        <button type="button" data-action="seedMockWorkbook">Seed mock workbook</button>
        <button type="button" data-action="getMockWorkbookStatus">Check mock workbook</button>
        <pre id="result">Not checked yet.</pre>
      </section>
    </main>

    <script>
      const buttons = document.querySelectorAll("[data-action]");
      const result = document.getElementById("result");

      function renderStatus(status) {
        result.textContent = JSON.stringify(status, null, 2);
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const action = button.dataset.action;

          result.textContent =
            action === "seedMockWorkbook" || action === "setupWorkbook"
              ? "Working..."
              : "Checking...";

          google.script.run
            .withSuccessHandler(renderStatus)
            .withFailureHandler((error) => {
              result.textContent = JSON.stringify(
                {
                  ok: false,
                  message: error && error.message ? error.message : String(error)
                },
                null,
                2
              );
            })
            [action]();
        });
      });
    </script>
  </body>
</html>
